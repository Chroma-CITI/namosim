    cost: 1.0
    polygon:
      - [-0.95, 1.9]
      - [-0.95, 0.0]
      - [0.95, 0.0]
      - [0.95, 1.9]
  - name: "bottom_doorway_taboo"
    cost: 1.0
    polygon:
      - [-0.95, 0.0]
      - [-0.95, -1.9]
      - [0.95, -1.9]
      - [0.95, 0.0]
  - name: "wall_mid_bottom_left_taboo"
    cost: 1.0
    polygon:
      - [-1.95, -0.95]
      - [-1.0, -0.95]
      - [-1.0, -2.1]
      - [-1.95, -2.1]