# World

## Meta properties

### Map discretization properties
discretization_data:
  res: 0.1
  inflation_radius: 0.50
  cost_lethal: 100
  cost_inscribed: 50
  cost_circumscribed: 20
  cost_possibly_nonfree: 10

### Force pushes only for all objects
force_pushes_only: True

## Robot
robot:
  name: pepper
  radius: 0.5 # [m]
  g_fov_min_radius: 0.0 # [m]
  g_fov_max_radius: 2.4 # [m]
  g_fov_opening_angle: 180.0 # [degrees]
  s_fov_min_radius: 0.7 # 0.7 # [m]
  s_fov_max_radius: 2.0 # 2.0 # [m]
  s_fov_opening_angle: 100.0 # 100.0 # [degrees]
  initial_pose: [1.0, -2.0, 90.0] # x, y, theta
#  initial_pose: [0.0, -3.25, 90.0] # x, y, theta

## Object(s)
objects:
  - name: "wall_ext_top"
    type: "wall"
    polygon:
      - [-2.2, 3.5]
      - [3.2, 3.5]
      - [3.2, 3.7]
      - [-2.2, 3.7]
  - name: "wall_ext_bottom"
    type: "wall"
    polygon:
      - [-2.2, -3.5]
      - [3.2, -3.5]
      - [3.2, -3.7]
      - [-2.2, -3.7]
  - name: "wall_ext_left"
    type: "wall"
    polygon:
      - [-2.2, 3.5]
      - [-2.0, 3.5]
      - [-2.0, -3.5]
      - [-2.2, -3.5]
  - name: "wall_ext_right"
    type: "wall"
    polygon:
      - [3.2, 3.5]
      - [3.2, -3.5]
      - [3.0, -3.5]
      - [3.0, 3.5]
  - name: "movable_box"
    type: "cardboard_box"
    polygon:
      - [-0.5, -1.5]
      - [-0.5, -2.5]
      - [0.5, -2.5]
      - [0.5, -1.5]
  - name: "unmovable_box"
    type: "concrete_box"
    polygon:
      - [0.5, -1.5]
      - [0.5, -0.5]
      - [1.5, -0.5]
      - [1.5, -1.5]

# Movable Whitelist
whitelist:
  - "cardboard_box"

# List of push-only objects
push_only_list:
  - "cardboard_box"

