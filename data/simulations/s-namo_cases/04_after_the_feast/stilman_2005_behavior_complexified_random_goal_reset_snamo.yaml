# Simulation

# Files to load
files:
  world_file: "../../../worlds/s-namo_cases/04_after_the_feast/04_after_the_feast_omniscient_complexified.yaml"

# Autonomous agents - Behaviors associations
agents_behaviors:
  -
    agent_name: "robot_01" # Must correspond to one of the world entities's actual name
    behavior:
      name: "stilman_2005_behavior"
      parameters:
        # Original Stilman method configuration parameters
        alpha_for_obstacle_choice_heur: 0.5
        neighborhood_for_obstacle_choice_heur: "TAXI" # Or "CHESSBOARD"
        heuristic_cost_for_traversing_obstacle_in_choice_heur: 2.0
        basic_translation_force: 2.0
        basic_rotation_moment: 2.0
        # Robot action space parameters
        collision_check_angular_res: 5.0 # [deg]
        robot_rotation_unit_angle: 30.0 # [deg]
        robot_translation_unit_length: 0.1
        forbid_rotations: False
        # S-NAMO parameters
        use_social_cost: True
        solution_interval_bound_percentage: 0.01
        manipulation_search_procedure: "DFS" # or "BFS"
        # Extra performance parameters
        check_new_local_opening_before_global: True # Generally faster if True
        deactivate_grids_logging: True # Generally faster if False
      randomization:
        generate_random_goals: True
        nb_goals_to_generate: 5
        randomization_type: "discrete" # Either "uniform" or "discrete"

# General simulation parameters
provide_walls: True
display_sim_knowledge_only_once: False
reset_after_goal_01: True
