# World

## Files to load
files:
  geometry_file: "./01_two_rooms_corridor.svg"
  # TODO ontology_file: ../../../ontologies/main.owl

## World geometry interpretation properties
geometry_scale: 0.1 # SVG measurements will be multiplied by this value

## World discretization properties
discretization_data:
  res: 0.05
  inflation_radius: 0.0
  cost_lethal: 100
  cost_inscribed: 50
  cost_circumscribed: 20
  cost_possibly_nonfree: 10

## World physical entities/zones
things:
  entities:
    -
        name: "robot_01"
        type: "robot"
        geometry:
            from: "file"
            id: "robot_01"
            orientation_id: "robot_01_dir" # Points to a 2-points path object in SVG that gives the entity's direction
        # pose:
        #   position:
        #     x: 0.0
        #     y: 0.0
        #   orientation:
        #     z: 0.0
        # radius: 0.25 # [m] # Creates a circular robot with radius
        # polygon:
        #   - [...]
        movable_whitelist:
            - "box"
        push_only_list:
            - "box"
        force_pushes_only: True
        sensors:
          -
              type: "omniscient"
    -
        name: "wall_ext_top"
        type: "wall"
        geometry:
          from: "file"
          id: "wall_ext_top"
    -
        name: "wall_ext_bottom"
        type: "wall"
        geometry:
          from: "file"
          id: "wall_ext_bottom"
    -
        name: "wall_ext_left"
        type: "wall"
        geometry:
          from: "file"
          id: "wall_ext_left"
    -
        name: "wall_ext_right"
        type: "wall"
        geometry:
          from: "file"
          id: "wall_ext_right"
    -
        name: "wall_mid_top_left"
        type: "wall"
        geometry:
          from: "file"
          id: "wall_mid_top_left"
    -
        name: "wall_mid_top_right"
        type: "wall"
        geometry:
          from: "file"
          id: "wall_mid_top_right"
    -
        name: "wall_mid_bottom_left"
        type: "wall"
        geometry:
          from: "file"
          id: "wall_mid_bottom_left"
    -
        name: "wall_mid_bottom_right"
        type: "wall"
        geometry:
          from: "file"
          id: "wall_mid_bottom_right"

  zones:
    goals:
    -
        name: "goal_01"
        geometry:
          from: "file"
          id: "goal_01"
          orientation_id: "goal_01_dir"
    # taboos:
