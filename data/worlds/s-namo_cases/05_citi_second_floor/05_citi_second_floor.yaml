# World

## Files to load
files:
  geometry_file: "./05_citi_second_floor.svg"
  # TODO ontology_file: ../../../ontologies/main.owl

## World geometry interpretation properties
geometry_scale: 0.1 # SVG measurements will be multiplied by this value

## World discretization properties
discretization_data:
  res: 0.1
  inflation_radius: 0.0
  cost_lethal: 100
  cost_inscribed: 50
  cost_circumscribed: 20
  cost_possibly_nonfree: 10

## World physical entities/zones
things:
  entities:
    -
        name: "robot_01"
        type: "robot"
        geometry:
            from: "file"
            id: "robot_01"
            orientation_id: "robot_01_dir" # Points to a 2-points path object in SVG that gives the entity's direction
        # pose:
        #   position:
        #     x: 0.0
        #     y: 0.0
        #   orientation:
        #     z: 0.0
        # radius: 0.25 # [m] # Creates a circular robot with radius
        # polygon:
        #   - [...]
        movable_whitelist:
            - "box"
        push_only_list:
            - "box"
        force_pushes_only: True
        sensors:
          -
            type: "perfect_g_fov"
            min_radius: 0.0 # [m]
            max_radius: 2.4 # [m]
            opening_angle: 180.0 # [degrees]
          -
            type: "perfect_s_fov"
            min_radius: 0.0 # 0.7 # [m]
            max_radius: 2.4 # 2.0 # [m]
            opening_angle: 180.0 # 100.0 # [degrees]
    -
        name: "ext_obstacle"
        type: "wall"
        geometry:
          from: "file"
          id: "ext_obstacle"
    -
        name: "middle_obstacle"
        type: "wall"
        geometry:
          from: "file"
          id: "middle_obstacle"
    -
        name: "pillar"
        type: "wall"
        geometry:
          from: "file"
          id: "pillar"
    -
        name: "movable_box"
        type: "box"
        geometry:
          from: "file"
          id: "movable_box"

  zones:
    goals:
    -
        name: "goal_01"
        geometry:
          from: "file"
          id: "goal_01"
          orientation_id: "goal_01_dir"
    # taboos:
