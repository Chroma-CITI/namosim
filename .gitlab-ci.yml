default:
  image: ros:ros-iron-core-jammy
  tags:
    - ci.inria.fr
    - small
    - linux

stages:
  - build-and-test

build-and-test-job:
  stage: build-and-test
  script:
    - apt-get update -y
    - apt-get install -y swig curl
    - curl -sSL https://install.python-poetry.org | python3 -
    - export PATH="/root/.local/bin:$PATH"
    - poetry install
    - poetry run poe lint_check
    - poetry run poe test
