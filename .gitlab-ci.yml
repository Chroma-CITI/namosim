default:
  image: python:3.10-bookworm
  tags:
    - ci.inria.fr
    - small
    - linux

stages:
  - build

build-job:
  stage: build
  script:
    - apt-get update -y
    - apt-get install -y swig
    - curl -sSL https://install.python-poetry.org | python3 -
    - export PATH="/root/.local/bin:$PATH"
    - poetry install
